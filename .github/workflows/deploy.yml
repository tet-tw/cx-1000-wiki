name: deploy-docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# 讓 Actions 有權限部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只跑一個部署；排隊執行、不取消進行中的部署，
# 確保「最後完成的一定是最新的 commit」（避免快速連推時舊內容覆蓋新內容）
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build site
        run: mkdocs build --strict
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
